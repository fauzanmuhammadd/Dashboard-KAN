<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard-KAN</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      background: #003366;
      color: white;
      padding: 25px 0;
    }
    header h1 {
      margin: 0;
      font-size: 2.2em;
    }
    header p {
      margin: 8px 0 0;
      font-size: 1.2em;
    }
    main {
      padding: 40px;
    }
    iframe {
      border: 2px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 5px 12px rgba(0,0,0,0.15);
    }
    footer {
      background: #003366;
      color: white;
      padding: 12px 0;
      margin-top: 40px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>
    <h1>Dashboard-KAN</h1>
    <p>Key Performance Indicator (KPI) Logistic PT KAN</p>
  </header>

  <main>
    <iframe 
      width="1000" 
      height="600" 
      src="https://app.powerbi.com/view?r=YOUR_EMBED_CODE" 
      frameborder="0" 
      allowFullScreen="true">
    </iframe>
  </main>

  <footer>
    © 2026 PT KAN – Logistic KPI Dashboard
  </footer>
</body>
</html>
